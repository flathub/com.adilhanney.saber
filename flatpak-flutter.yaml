app-id: com.adilhanney.saber
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20
command: saber
separate-locales: false
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --talk-name=org.freedesktop.secrets
  - --filesystem=xdg-documents/Saber:create
  - --filesystem=xdg-config/kdeglobals:ro
cleanup:
  - /include
  - /lib/cmake
  - /lib/pkgconfig
modules:
  - name: libjsoncpp
    buildsystem: meson
    config-opts:
      - --buildtype=release
      - --default-library=shared
    sources:
      - type: archive
        url: https://github.com/open-source-parsers/jsoncpp/archive/refs/tags/1.9.7.tar.gz
        sha256: 830bf352d822d8558e9d0eb19d640d2e38536b4b6699c30a4488da09d5b1df18
        x-checker-data:
          type: json
          url: https://api.github.com/repos/open-source-parsers/jsoncpp/releases/latest
          version-query: .tag_name
          url-query: .tag_name | "https://github.com/open-source-parsers/jsoncpp/archive/refs/tags/"
            + . + ".tar.gz"
  - name: zenity
    buildsystem: meson
    config-opts:
      - -Dbuildtype=release
      - -Dmanpage=false
    cleanup:
      - /share/applications
      - /share/help
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/zenity.git
        tag: 4.2.2
        commit: c0f30c18e55b6a0cf5c2deb1c7449debb79027dc
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$
  - name: saber
    buildsystem: simple
    build-options:
      arch:
        x86_64:
          env:
            BUNDLE_PATH: build/linux/x64/release/bundle
        aarch64:
          env:
            BUNDLE_PATH: build/linux/arm64/release/bundle
      append-path: /usr/lib/sdk/llvm20/bin:/var/lib/rustup/bin:/run/build/saber/submodules/flutter/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
      env:
        PUB_CACHE: /run/build/saber/.pub-cache
        CARGO_HOME: /run/build/saber/cargo
        RUSTUP_HOME: /var/lib/rustup
    build-commands:
      - ./patches/pre/remove_dev_dependencies.sh
      - ./patches/pre/remove_proprietary_dependencies.sh
      - flutter config --no-cli-animations
      - ./patches/post/remove_wasm_libs.sh
      - flutter build linux --no-pub
      - cp -a ${BUNDLE_PATH}/. /app/bin/
      - install -Dm644 flatpak/com.adilhanney.saber.desktop -t /app/share/applications/
      - install -Dm644 flatpak/com.adilhanney.saber.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 assets/icon/icon_linux.svg /app/share/icons/hicolor/scalable/apps/com.adilhanney.saber.svg
    sources:
      - type: git
        url: https://github.com/saber-notes/saber.git
        tag: v1.33.1
        commit: 30d16da7604ecd5b3a330bac0409c241e2304a72
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+(?:\+.*)?)$
          is-main-source: true
    modules:
      - generated/modules/rustup-1.94.0.json
